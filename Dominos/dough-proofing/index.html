<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dough Proofing</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 15px;
}

/* Header */
h1 {
    text-align: center;
    margin-bottom: 15px;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
}

/* Card */
.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Card title */
.card h3 {
    margin-bottom: 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

/* Inputs */
label {
    font-size: 13px;
    opacity: 0.8;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

/* Date full width */
.full {
    grid-column: span 2;
}

@media (min-width: 768px) {
    .full {
        grid-column: span 4;
    }
}

/* Results */
.results {
    margin-top: 15px;
    padding: 15px;
    background: #020617;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.6;
}

/* Status colors */
.good { color: #22c55e; }
.warn { color: #eab308; }
.bad  { color: #ef4444; }

</style>
</head>

<body>

<div class="container">

<h1>🍕 Dough Proofing</h1>

<datalist id="dateList">
    <option value="Lun-Sam">
    <option value="Mar-Dim">
    <option value="Mer-Lun">
    <option value="Jeu-Mar">
    <option value="Ven-Mer">
    <option value="Sam-Jeu">
    <option value="Dim-Ven">
</datalist>

<form id="form">

<!-- 10 -->
<div class="card">
    <h3>10"</h3>
    <div class="grid">
        <label>Trays</label>
        <input type="number" name="tray10" value="0">

        <label>Dough</label>
        <input type="number" name="dough10" value="0">

        <label class="full">Date</label>
        <input class="full" name="date10" list="dateList">
    </div>
</div>

<!-- 12 -->
<div class="card">
    <h3>12"</h3>
    <div class="grid">
        <label>Trays</label>
        <input type="number" name="tray12" value="0">

        <label>Dough</label>
        <input type="number" name="dough12" value="0">

        <label class="full">Date</label>
        <input class="full" name="date12" list="dateList">
    </div>
</div>

<!-- 14 -->
<div class="card">
    <h3>14"</h3>
    <div class="grid">
        <label>Trays</label>
        <input type="number" name="tray14" value="0">

        <label>Dough</label>
        <input type="number" name="dough14" value="0">

        <label class="full">Date</label>
        <input class="full" name="date14" list="dateList">
    </div>
</div>

<!-- 16 -->
<div class="card">
    <h3>16"</h3>
    <div class="grid">
        <label>Trays</label>
        <input type="number" name="tray16" value="0">

        <label>Dough</label>
        <input type="number" name="dough16" value="0">

        <label class="full">Date</label>
        <input class="full" name="date16" list="dateList">
    </div>
</div>

<!-- PAN -->
<div class="card">
    <h3>Pan</h3>
    <div class="grid">
        <label>Trays</label>
        <input type="number" name="trayPan" value="0">

        <label>Dough</label>
        <input type="number" name="doughPan" value="0">

        <label class="full">Date</label>
        <input class="full" name="datePan" list="dateList">
    </div>
</div>

</form>

<div id="results" class="results"></div>

</div>

<script>

const traySizes = {
    10: 10,
    12: 8,
    14: 6,
    16: 5,
    pan: 6
};

const dates_hours = {
    'Lun-Sam': {0:"N/A",1:"2/6",2:"2/4",3:"1/2",4:"0/1",5:"0/1-2",6:"0/0"},
    'Mar-Dim': {0:"0/0",1:"N/A",2:"2/6",3:"2/4",4:"1/2",5:"0/1",6:"0/1-2"},
    'Mer-Lun': {0:"0/1-2",1:"0/0",2:"N/A",3:"2/6",4:"2/4",5:"1/2",6:"0/1"},
    'Jeu-Mar': {0:"0/1",1:"0/1-2",2:"0/0",3:"N/A",4:"2/6",5:"2/4",6:"1/2"},
    'Ven-Mer': {0:"1/2",1:"0/1",2:"0/1-2",3:"0/0",4:"N/A",5:"2/6",6:"2/4"},
    'Sam-Jeu': {0:"2/4",1:"1/2",2:"0/1",3:"0/1-2",4:"0/0",5:"N/A",6:"2/6"},
    'Dim-Ven': {0:"2/6",1:"2/4",2:"1/2",3:"0/1",4:"0/1-2",5:"0/0",6:"N/A"},
    'N/A': {0:"--",1:"--",2:"--",3:"--",4:"--",5:"--",6:"--"}
};

const form = document.getElementById("form");
const results = document.getElementById("results");

function getStatusClass(hours) {
    if (hours.includes("2/6")) return "good";
    if (hours.includes("1/2") || hours.includes("2/4")) return "warn";
    return "bad";
}

function calc() {
    const data = new FormData(form);
    const day = new Date().getDay();

    function line(size, key, traySize) {
        const trays = parseInt(data.get(`tray${key}`)) || 0;
        const dough = parseInt(data.get(`dough${key}`)) || 0;
        const date = data.get(`date${key}`) || "N/A";

        const total = trays * traySize + dough;
        const hours = dates_hours[date][day];
        const cls = getStatusClass(hours);

        return `<div class="${cls}">${size}" → [${total}] (${hours})</div>`;
    }

    results.innerHTML = `
        ${line(10, 10, traySizes[10])}
        ${line(12, 12, traySizes[12])}
        ${line(14, 14, traySizes[14])}
        ${line(16, 16, traySizes[16])}
        ${line("PAN", "Pan", traySizes.pan)}
    `;
}

/* Live update */
form.addEventListener("input", calc);

/* Initial calc */
calc();

</script>

</body>
</html>
