<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dough Proofing</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 15px;
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 12px;
}

.card h3 {
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

label {
    font-size: 13px;
    opacity: 0.8;
}

/* Number controls */
.number-control {
    display: flex;
    align-items: center;
    gap: 5px;
}

.number-control button {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 6px;
    background: #334155;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.number-control button:active {
    background: #475569;
}

.number-control input {
    width: 60px;
    text-align: center;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: #020617;
    color: white;
}

/* SELECT FIX */
select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
    appearance: none;
}

/* Full width */
.full {
    grid-column: span 2;
}

@media (min-width: 768px) {
    .full {
        grid-column: span 4;
    }
}

.results {
    margin-top: 15px;
    padding: 15px;
    background: #020617;
    border-radius: 10px;
}

.good { color: #22c55e; }
.warn { color: #eab308; }
.bad  { color: #ef4444; }

</style>
</head>

<body>

<div class="container">
<h1>🍕 Dough Proofing</h1>

<form id="form">
<div id="inputs"></div>
</form>

<div id="results" class="results"></div>
</div>

<script>

function createRow(size, key) {
    return `
    <div class="card">
        <h3>${size}"</h3>
        <div class="grid">

            <label>Trays</label>
            <div class="number-control">
                <button type="button" data-action="dec">-</button>
                <input type="number" name="tray${key}" min="0">
                <button type="button" data-action="inc">+</button>
            </div>

            <label>Dough</label>
            <div class="number-control">
                <button type="button" data-action="dec">-</button>
                <input type="number" name="dough${key}" min="0">
                <button type="button" data-action="inc">+</button>
            </div>

            <label class="full">Date</label>
            <select class="full" name="date${key}">
                <option value="N/A">Select date</option>
                <option value="Lun-Sam">Lun-Sam</option>
                <option value="Mar-Dim">Mar-Dim</option>
                <option value="Mer-Lun">Mer-Lun</option>
                <option value="Jeu-Mar">Jeu-Mar</option>
                <option value="Ven-Mer">Ven-Mer</option>
                <option value="Sam-Jeu">Sam-Jeu</option>
                <option value="Dim-Ven">Dim-Ven</option>
            </select>

        </div>
    </div>`;
}

const inputsDiv = document.getElementById("inputs");
inputsDiv.innerHTML =
    createRow(10,10) +
    createRow(12,12) +
    createRow(14,14) +
    createRow(16,16) +
    createRow("PAN","Pan");

const traySizes = {10:10,12:8,14:6,16:5,pan:6};

const dates_hours = {
    'Lun-Sam': {0:"N/A",1:"2/6",2:"2/4",3:"1/2",4:"0/1",5:"0/1-2",6:"0/0"},
    'Mar-Dim': {0:"0/0",1:"N/A",2:"2/6",3:"2/4",4:"1/2",5:"0/1",6:"0/1-2"},
    'Mer-Lun': {0:"0/1-2",1:"0/0",2:"N/A",3:"2/6",4:"2/4",5:"1/2",6:"0/1"},
    'Jeu-Mar': {0:"0/1",1:"0/1-2",2:"0/0",3:"N/A",4:"2/6",5:"2/4",6:"1/2"},
    'Ven-Mer': {0:"1/2",1:"0/1",2:"0/1-2",3:"0/0",4:"N/A",5:"2/6",6:"2/4"},
    'Sam-Jeu': {0:"2/4",1:"1/2",2:"0/1",3:"0/1-2",4:"0/0",5:"N/A",6:"2/6"},
    'Dim-Ven': {0:"2/6",1:"2/4",2:"1/2",3:"0/1",4:"0/1-2",5:"0/0",6:"N/A"},
    'N/A': {0:"--",1:"--",2:"--",3:"--",4:"--",5:"--",6:"--"}
};

const form = document.getElementById("form");
const results = document.getElementById("results");

/* +/- click */
document.addEventListener("click", e => {
    if (!e.target.dataset.action) return;

    const input = e.target.parentElement.querySelector("input");
    let value = parseInt(input.value) || 0;

    if (e.target.dataset.action === "inc") value++;
    else value = Math.max(0, value - 1);

    input.value = value;
    calc();
});

/* Hold */
let interval;
document.addEventListener("mousedown", e => {
    if (!e.target.dataset.action) return;
    interval = setInterval(() => e.target.click(), 120);
});
document.addEventListener("mouseup", () => clearInterval(interval));

/* Calc */
function getStatusClass(hours) {
    if (hours.includes("2/6")) return "good";
    if (hours.includes("1/2") || hours.includes("2/4")) return "warn";
    return "bad";
}

function calc() {
    const data = new FormData(form);
    const day = new Date().getDay();

    function line(size, key, traySize) {
        const trays = parseInt(data.get(`tray${key}`)) || 0;
        const dough = parseInt(data.get(`dough${key}`)) || 0;
        const date = data.get(`date${key}`) || "N/A";

        const total = trays * traySize + dough;
        const hours = dates_hours[date][day];
        const cls = getStatusClass(hours);

        return `<div class="${cls}">${size}" → [${total}] (${hours})</div>`;
    }

    results.innerHTML = `
        ${line(10,10,traySizes[10])}
        ${line(12,12,traySizes[12])}
        ${line(14,14,traySizes[14])}
        ${line(16,16,traySizes[16])}
        ${line("PAN","Pan",traySizes.pan)}
    `;
}

form.addEventListener("input", calc);
calc();

</script>

</body>
</html>
