<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dough Proofing</title>

<link rel="manifest" href="manifest.json">

<style>
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type="number"] {
    outline: none;
}
button {
    user-select: none;
}
select {
    outline: none;
}
/* Remove arrows (Firefox) */
input[type="number"] {
    -moz-appearance: textfield;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 15px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

/* Top buttons */
.top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.top-bar button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
}

.install-btn {
    background: #22c55e;
    color: black;
}

/* Cards */
.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 12px;
    border-bottom: 1px solid #334155;

}

.card h3 {
    margin-bottom: 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background-color: rgb(35, 47, 64);
    padding: 10px;
    border-radius: 8px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

label {
    font-size: 13px;
    opacity: 0.8;
}

/* Number controls */
.number-control {
    display: flex;
    align-items: center;
    gap: 5px;
}

.number-control button {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 6px;
    background: #334155;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.number-control button:active {
    background: #475569;
}

.number-control input {
    width: 60px;
    text-align: center;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: #020617;
    color: white;
}

/* Dropdown */
select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
    appearance: none;
}

/* Full width */
.full {
    grid-column: span 2;
}

@media (min-width: 768px) {
    .full {
        grid-column: span 4;
    }
}

/* Results */
.results {
    margin-top: 15px;
    padding: 15px;
    background: #020617;
    border-radius: 10px;
    font-size: 15px;
}


.addRowBtn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: #ffffff;
    cursor: pointer;
    font-weight: bold;
}

/* Remove button (small X) */
.removeRow {
    background: #ef4444;
    border: none;
    border-radius: 6px;
    color: #ffffff;
    width: 30px;
    height: 30px;
    font-size: 16px;
    cursor: pointer;
    justify-self: start;
}

/* Make entry layout nicer */
.entry {
    position: relative;
    padding-bottom: 10px;
    border-bottom: 1px solid #334155;
    margin-bottom: 10px;
}

.good { color: #22c55e; }
.warn { color: #eab308; }
.bad  { color: #ef4444; }
/* Add Row button */
</style>
</head>

<body>

<div class="container">

<h1>🍕 Dough Proofing</h1>

<div class="top-bar">
    <button id="loadBtn">Load Last</button>
    <button id="clearBtn">Clear</button>
    <button id="installBtn" class="install-btn" style="display:none;">Install App</button>
</div>

<form id="form">
<div id="inputs"></div>
</form>

<div id="results" class="results"></div>

</div>

<script>

/* ---------- CREATE MULTI-ROW UI ---------- */
function createRow(size, key) {
    return `
    <div class="card" data-size="${key}">
        <h3>${size}</h3>

        <div class="rows"></div>

        <button type="button" class="addRowBtn">+ Add Row</button>
    </div>`;
}

function createEntry(key) {
    return `
    <div class="grid entry">

        <label>Trays</label>
        <div class="number-control">
            <button type="button" data-action="dec">-</button>
            <input type="number" name="tray${key}" min="0">
            <button type="button" data-action="inc">+</button>
        </div>

        <label>Dough</label>
        <div class="number-control">
            <button type="button" data-action="dec">-</button>
            <input type="number" name="dough${key}" min="0">
            <button type="button" data-action="inc">+</button>
        </div>

        <label>Date</label>
        <select name="date${key}">
            <option value="N/A">Select</option>
            <option value="Lun-Sam">Lun-Sam</option>
            <option value="Mar-Dim">Mar-Dim</option>
            <option value="Mer-Lun">Mer-Lun</option>
            <option value="Jeu-Mar">Jeu-Mar</option>
            <option value="Ven-Mer">Ven-Mer</option>
            <option value="Sam-Jeu">Sam-Jeu</option>
            <option value="Dim-Ven">Dim-Ven</option>
        </select>

        <button type="button" class="removeRow">✕</button>

    </div>`;
}

const inputsDiv = document.getElementById("inputs");

inputsDiv.innerHTML =
    createRow(10+"\"",10) +
    createRow(12+"\"",12) +
    createRow(14+"\"",14) +
    createRow(16+"\"",16) +
    createRow("PAN","Pan");

/* Add default row to each */
document.querySelectorAll(".card").forEach(card => {
    const key = card.dataset.size;
    const rows = card.querySelector(".rows");
    rows.innerHTML = createEntry(key);
});

/* ---------- ADD / REMOVE ROW ---------- */
document.addEventListener("click", e => {

    /* Add row */
    if (e.target.classList.contains("addRowBtn")) {
        const card = e.target.closest(".card");
        const key = card.dataset.size;
        card.querySelector(".rows").insertAdjacentHTML("beforeend", createEntry(key));
    }

    /* Remove row */
    if (e.target.classList.contains("removeRow")) {
        e.target.closest(".entry").remove();
        calc();
    }

    /* +/- buttons */
    if (e.target.dataset.action) {
        const input = e.target.parentElement.querySelector("input");
        let value = parseInt(input.value) || 0;

        if (e.target.dataset.action === "inc") value++;
        else value = Math.max(0, value - 1);

        input.value = value;
        calc();
    }
});

/* HOLD WITH ACCELERATION */
let holdTimeout;
let holdInterval;
let speed = 120;

document.addEventListener("mousedown", e => {
    if (!e.target.dataset.action) return;

    speed = 120;

    // small delay before hold starts (feels more natural)
    holdTimeout = setTimeout(() => {

        holdInterval = setInterval(() => {
            e.target.click();

            // accelerate
            if (speed > 30) {
                speed -= 10;
                clearInterval(holdInterval);
                holdInterval = setInterval(() => {
                    e.target.click();
                }, speed);
            }

        }, speed);

    }, 300); // delay before auto-repeat starts
});

document.addEventListener("mouseup", () => {
    clearTimeout(holdTimeout);
    clearInterval(holdInterval);
});

document.addEventListener("mouseleave", () => {
    clearTimeout(holdTimeout);
    clearInterval(holdInterval);
});

/* ---------- DATA ---------- */
const traySizes = {10:10,12:8,14:6,16:5,pan:6};

const dates_hours = {
    'Lun-Sam': {0:"N/A",1:"2/6",2:"2/4",3:"1/2",4:"0/1",5:"0/1-2",6:"0/0"},
    'Mar-Dim': {0:"0/0",1:"N/A",2:"2/6",3:"2/4",4:"1/2",5:"0/1",6:"0/1-2"},
    'Mer-Lun': {0:"0/1-2",1:"0/0",2:"N/A",3:"2/6",4:"2/4",5:"1/2",6:"0/1"},
    'Jeu-Mar': {0:"0/1",1:"0/1-2",2:"0/0",3:"N/A",4:"2/6",5:"2/4",6:"1/2"},
    'Ven-Mer': {0:"1/2",1:"0/1",2:"0/1-2",3:"0/0",4:"N/A",5:"2/6",6:"2/4"},
    'Sam-Jeu': {0:"2/4",1:"1/2",2:"0/1",3:"0/1-2",4:"0/0",5:"N/A",6:"2/6"},
    'Dim-Ven': {0:"2/6",1:"2/4",2:"1/2",3:"0/1",4:"0/1-2",5:"0/0",6:"N/A"},
    'N/A': {0:"--",1:"--",2:"--",3:"--",4:"--",5:"--",6:"--"}
};

const form = document.getElementById("form");
const results = document.getElementById("results");

/* ---------- CALC ---------- */
function getStatusClass(hours) {
    if (hours.includes("2/6")) return "good";
    if (hours.includes("1/2") || hours.includes("2/4")) return "warn";
    return "bad";
}

function calc() {

    function calcSize(key, traySize, label) {
        const card = document.querySelector(`[data-size="${key}"]`);

        let grouped = {};

        card.querySelectorAll(".entry").forEach(entry => {
            const trays = parseInt(entry.querySelector(`[name="tray${key}"]`).value) || 0;
            const dough = parseInt(entry.querySelector(`[name="dough${key}"]`).value) || 0;
            const date = entry.querySelector(`[name="date${key}"]`).value;

            if (date === "N/A") return;

            const total = trays * traySize + dough;

            if (!grouped[date]) grouped[date] = 0;
            grouped[date] += total;
        });

        const today = new Date().getDay(); // 0 = Sunday, 6 = Saturday

        const parts = Object.entries(grouped)
            .map(([date, total]) => {
                const hours = dates_hours[date]?.[today] || "--";
                return `[ ${total} ] (${hours})`;
            });

        if (parts.length === 0) return `<div>${label}" → —</div>`;

        return `<div>${label}" → ${parts.join(" + ")}</div>`;
    }

    results.innerHTML = `
        ${calcSize(10,10,10)}
        ${calcSize(12,8,12)}
        ${calcSize(14,6,14)}
        ${calcSize(16,5,16)}
        ${calcSize("Pan",6,"PAN")}
    `;
}

const loadBtn = document.getElementById("loadBtn");
const clearBtn = document.getElementById("clearBtn");

/* ---------- SAVE DATA ---------- */
function saveData() {
    const data = [];

    document.querySelectorAll(".entry").forEach(entry => {
        const inputs = entry.querySelectorAll("input, select");

        const row = {};
        inputs.forEach(input => {
            row[input.name] = input.value;
        });

        data.push(row);
    });

    localStorage.setItem("doughData", JSON.stringify(data));
}

/* ---------- LOAD DATA ---------- */
function loadData() {
    const data = JSON.parse(localStorage.getItem("doughData") || "[]");

    if (!data.length) return;

    // Clear existing rows
    document.querySelectorAll(".rows").forEach(r => r.innerHTML = "");

    data.forEach(row => {
        const key = Object.keys(row)[0].replace(/[^\dA-Za-z]/g, "").replace("tray", "");

        const card = document.querySelector(`[data-size="${key}"]`);
        if (!card) return;

        const rowsDiv = card.querySelector(".rows");
        rowsDiv.insertAdjacentHTML("beforeend", createEntry(key));

        const newEntry = rowsDiv.lastElementChild;

        Object.entries(row).forEach(([name, value]) => {
            const input = newEntry.querySelector(`[name="${name}"]`);
            if (input) input.value = value;
        });
    });

    calc();
}

/* ---------- CLEAR DATA ---------- */
function clearData() {
    // localStorage.removeItem("doughData");

    document.querySelectorAll(".rows").forEach(rows => {
        const key = rows.closest(".card").dataset.size;
        rows.innerHTML = createEntry(key); // reset to 1 row
    });

    calc();
}

/* ---------- EVENTS ---------- */
loadBtn.addEventListener("click", loadData);
clearBtn.addEventListener("click", clearData);

/* Auto-save on change */
form.addEventListener("input", saveData);

form.addEventListener("input", calc);
calc();

</script>

</body>
</html>
